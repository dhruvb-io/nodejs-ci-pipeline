name: CI Pipeline

on:
    push:
        branches:
            - main

jobs:
    build:

        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version:
                    - 18.x

        steps:

            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4

              with:
                node-version: ${{ matrix.node-version }}

            - name: Installing NPM dependencies
              run: npm install

            - name: Run Tests
              run: npm test

            - name: Start Application
              run: npm run start